name: Android libs build (Vulkan-enabled)

# Builds libedge_veda.so for arm64-v8a / armeabi-v7a / x86_64 with
# the Vulkan ggml backend compiled in. Designed for the
# bitcoin-portal/mobile-news Android Phase-7 perf push (issue #586).
# CPU-only fallback at runtime is automatic - ggml selects CPU when
# Vulkan init fails, so a single binary serves all chipsets.
#
# Manual-trigger only. Resulting .so is uploaded as artifact for
# verification + hash update before vendoring into the AAR.

on:
  workflow_dispatch:
  release:
    types: [published]

concurrency:
  group: android-libs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build-android-libs
    runs-on: ubuntu-latest
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64]

    env:
      EVENT_NAME: ${{ github.event_name }}

    steps:
      - name: Checkout with submodules (full history)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          local-cache: true

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.27.0'

      - name: Set up Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.3.290.0
          cache: true

      - name: Configure CMake
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ABI: ${{ matrix.abi }}
        run: |
          mkdir -p "build-${ABI}"
          cmake -S core -B "build-${ABI}" \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="${ANDROID_NDK_HOME}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI="${ABI}" \
            -DANDROID_PLATFORM=android-24 \
            -DANDROID_STL=c++_shared \
            -DEDGE_VEDA_BUILD_SHARED=ON \
            -DEDGE_VEDA_BUILD_STATIC=OFF \
            -DEDGE_VEDA_ENABLE_VULKAN=ON \
            -DEDGE_VEDA_ENABLE_CPU=ON

      - name: Build edge_veda target
        env:
          ABI: ${{ matrix.abi }}
        run: cmake --build "build-${ABI}" --target edge_veda --parallel

      - name: Stage + hash
        env:
          ABI: ${{ matrix.abi }}
        run: |
          mkdir -p "artifact/${ABI}"
          SO=$(find "build-${ABI}" -name 'libedge_veda.so' | head -n 1)
          if [ -z "$SO" ]; then
            echo "ERROR: libedge_veda.so not found" >&2
            exit 1
          fi
          cp "$SO" "artifact/${ABI}/"
          (cd "artifact/${ABI}" && sha256sum libedge_veda.so > libedge_veda.so.sha256)
          cat "artifact/${ABI}/libedge_veda.so.sha256"
          ls -la "artifact/${ABI}"

      - name: Upload artifact
        if: env.EVENT_NAME != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: edge_veda-android-vulkan-${{ matrix.abi }}
          path: artifact/${{ matrix.abi }}/*
          retention-days: 30

      - name: Attach to release
        if: env.EVENT_NAME == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifact/${{ matrix.abi }}/libedge_veda.so
            artifact/${{ matrix.abi }}/libedge_veda.so.sha256
