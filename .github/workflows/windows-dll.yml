name: Windows DLL build

# Builds the Windows plugin DLL with the C++ core (llama.cpp +
# whisper.cpp + stable-diffusion.cpp + Vulkan backend) compiled in
# from third_party submodules. Uploads as a release artifact so host
# Flutter apps that pull this package via pub git (no submodules) can
# vendor a real binary instead of building from source.

on:
  push:
    branches: [main]
    paths:
      - 'core/**'
      - 'flutter/windows/**'
      - '.github/workflows/windows-dll.yml'
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: windows-dll-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build-windows-dll
    runs-on: windows-latest
    timeout-minutes: 90

    env:
      FLUTTER_VERSION_FAKE: '2.5.0'
      EVENT_NAME: ${{ github.event_name }}

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.3.290.0
          cache: true

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          channel: stable
          cache: true

      - name: Configure CMake
        shell: pwsh
        run: |
          $flutterRoot = (flutter --version --machine | ConvertFrom-Json).flutterRoot
          $flutterEng = "$flutterRoot/bin/cache/artifacts/engine/windows-x64"
          New-Item -ItemType Directory -Force -Path build | Out-Null
          cmake -S flutter/windows -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DFLUTTER_VERSION="$Env:FLUTTER_VERSION_FAKE" `
            -DFLUTTER_VERSION_MAJOR=2 `
            -DFLUTTER_VERSION_MINOR=5 `
            -DFLUTTER_VERSION_PATCH=0 `
            -DFLUTTER_VERSION_BUILD=0 `
            -Dflutter_INCLUDE_DIRS="$flutterEng" `
            -Dflutter_LIBRARY="$flutterEng/flutter_windows.dll.lib"

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Stage DLL
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact | Out-Null
          Copy-Item "build/Release/edge_veda_plugin.dll" "artifact/" -Force
          if (Test-Path "build/Release/edge_veda_plugin.pdb") {
            Copy-Item "build/Release/edge_veda_plugin.pdb" "artifact/" -Force
          }
          Get-ChildItem artifact

      - name: Upload CI artifact
        if: env.EVENT_NAME != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: edge_veda_plugin-windows-x64
          path: artifact/*
          retention-days: 14

      - name: Attach to release
        if: env.EVENT_NAME == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifact/edge_veda_plugin.dll
            artifact/edge_veda_plugin.pdb
