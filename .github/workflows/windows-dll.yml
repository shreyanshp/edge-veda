name: Windows DLL build

# Builds the Windows plugin DLL with the C++ core (llama.cpp +
# whisper.cpp + stable-diffusion.cpp + Vulkan backend) compiled in
# from third_party submodules. Uploads as a release artifact so host
# Flutter apps that pull this package via pub git (no submodules) can
# vendor a real binary instead of building from source.
#
# Manual-trigger only. Do not auto-fire on push or PR — the build
# pulls multi-GB submodules + Vulkan SDK and takes ~45 min on a
# Windows runner; only run it when a host app actually needs a
# fresh DLL.

on:
  workflow_dispatch:
  release:
    types: [published]

concurrency:
  group: windows-dll-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build-windows-dll
    runs-on: windows-latest
    timeout-minutes: 90

    env:
      FLUTTER_VERSION_FAKE: '2.5.0'
      EVENT_NAME: ${{ github.event_name }}

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.3.290.0
          cache: true

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          channel: stable
          cache: true

      # Pre-warm Flutter so the next `flutter --version --machine` call
      # returns clean JSON. The first invocation prints "Building
      # flutter tool..." / "Running pub upgrade..." on stderr+stdout
      # which break ConvertFrom-Json downstream. After this discard
      # call, --machine emits only the JSON.
      - name: Pre-warm Flutter
        shell: pwsh
        run: |
          flutter --version | Out-Null

      - name: Configure CMake
        shell: pwsh
        run: |
          # FLUTTER_ROOT is set by subosito/flutter-action — use it
          # directly to avoid re-parsing flutter --version.
          $flutterRoot = $Env:FLUTTER_ROOT
          $flutterEng = "$flutterRoot/bin/cache/artifacts/engine/windows-x64"
          New-Item -ItemType Directory -Force -Path build | Out-Null
          cmake -S flutter/windows -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DFLUTTER_VERSION="$Env:FLUTTER_VERSION_FAKE" `
            -DFLUTTER_VERSION_MAJOR=2 `
            -DFLUTTER_VERSION_MINOR=5 `
            -DFLUTTER_VERSION_PATCH=0 `
            -DFLUTTER_VERSION_BUILD=0 `
            -Dflutter_INCLUDE_DIRS="$flutterEng" `
            -Dflutter_LIBRARY="$flutterEng/flutter_windows.dll.lib"

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Stage DLL
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact | Out-Null
          Copy-Item "build/Release/edge_veda_plugin.dll" "artifact/" -Force
          if (Test-Path "build/Release/edge_veda_plugin.pdb") {
            Copy-Item "build/Release/edge_veda_plugin.pdb" "artifact/" -Force
          }
          if (Test-Path "build/Release/edge_veda.dll") {
            Copy-Item "build/Release/edge_veda.dll" "artifact/" -Force
          }
          if (Test-Path "build/Release/edge_veda.pdb") {
            Copy-Item "build/Release/edge_veda.pdb" "artifact/" -Force
          }
          Get-ChildItem artifact

      - name: Upload CI artifact
        if: env.EVENT_NAME != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: edge_veda_plugin-windows-x64
          path: artifact/*
          retention-days: 14

      - name: Attach to release
        if: env.EVENT_NAME == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifact/edge_veda_plugin.dll
            artifact/edge_veda_plugin.pdb
            artifact/edge_veda.dll
            artifact/edge_veda.pdb
