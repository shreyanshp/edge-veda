name: Windows DLL build

# Builds the C++ core as edge_veda.dll for the Flutter desktop runner
# at bitcoin-portal/mobile-news (issue #574). The Flutter plugin DLL
# (edge_veda_plugin.dll) is built by the host app's `flutter build
# windows` — it needs Flutter's CMake wrappers which only exist in a
# Flutter project context, so we don't try to build it here.
#
# Manual-trigger only.

on:
  workflow_dispatch:
  release:
    types: [published]

concurrency:
  group: windows-dll-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build-windows-dll
    runs-on: windows-latest
    timeout-minutes: 90

    env:
      EVENT_NAME: ${{ github.event_name }}

    steps:
      - name: Checkout with submodules (full history)
        uses: actions/checkout@v6
        with:
          submodules: recursive
          # libmdbx etc. inside Zano (and similar) need full git
          # history for `git describe --tags`. fetch-depth: 1 broke
          # builds before; keep it at 0 here for parity.
          fetch-depth: 0

      - name: Set up Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.3.290.0
          cache: true

      - name: Configure CMake (core only)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build | Out-Null
          # Configure the C++ core directly. Skip the Flutter plugin
          # (flutter/windows/CMakeLists.txt) — that needs Flutter's
          # CMake wrapper headers which only exist inside a host
          # `flutter build windows` invocation. The host app picks
          # those up automatically when it consumes the edge_veda dep.
          cmake -S core -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DEDGE_VEDA_BUILD_SHARED=ON `
            -DEDGE_VEDA_BUILD_STATIC=OFF `
            -DEDGE_VEDA_ENABLE_VULKAN=ON `
            -DEDGE_VEDA_ENABLE_CPU=ON

      - name: Build edge_veda target only
        shell: pwsh
        run: |
          # Build ONLY the edge_veda DLL target. The default
          # `cmake --build build` would also compile every llama.cpp
          # tool binary (llama-cli, llama-server, llama-perplexity,
          # llama-fit-params, llama-cvector-generator, ...) which
          # adds ~30 min of work and we don't ship any of them.
          cmake --build build --config Release --target edge_veda --parallel

      - name: Stage DLL
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact | Out-Null
          # Cmake puts the SHARED-library artifact under build/Release
          # by default on Visual Studio generators, but plugin /
          # subproject targets can land under nested subdirs — search
          # for both.
          $dll = Get-ChildItem -Recurse build -Filter edge_veda.dll | Select-Object -First 1
          $pdb = Get-ChildItem -Recurse build -Filter edge_veda.pdb | Select-Object -First 1
          if (-not $dll) { Write-Error "edge_veda.dll not found in build/"; exit 1 }
          Copy-Item $dll.FullName artifact/ -Force
          if ($pdb) { Copy-Item $pdb.FullName artifact/ -Force }
          Get-ChildItem artifact

      - name: Upload CI artifact
        if: env.EVENT_NAME != 'release'
        uses: actions/upload-artifact@v7
        with:
          name: edge_veda-windows-x64
          path: artifact/*
          retention-days: 14

      - name: Attach to release
        if: env.EVENT_NAME == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifact/edge_veda.dll
            artifact/edge_veda.pdb
