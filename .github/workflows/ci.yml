name: CI

# Manual-trigger only on this fork. Inherited from upstream
# hyle-team where this CI gates external contributions. We only push
# verified-from-local commits here (binaries are uploaded after local
# hash computation, not rebuilt in CI), so the auto-fire matrix
# (~80 runner-minutes per push) was burning Actions minutes for zero
# signal. Trigger manually before a release tag if a sanity check is
# wanted.
on:
  workflow_dispatch:

env:
  CMAKE_VERSION: '3.27.0'
  FLUTTER_VERSION: '3.41.2'
  NDK_VERSION: '26.1.10909125'

jobs:
  # C++ Core Build and Test
  core-build:
    name: Core Build - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        build_type: [Release, Debug]
        include:
          - os: ubuntu-latest
            cc: gcc-11
            cxx: g++-11
          - os: macos-latest
            cc: clang
            cxx: clang++

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            libvulkan-dev \
            vulkan-tools \
            clang-format \
            ccache

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install cmake ninja ccache

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: ${{ env.CMAKE_VERSION }}

      - name: Configure ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ matrix.os }}-${{ matrix.build_type }}

      - name: Cache Test Model
        if: matrix.build_type == 'Debug'
        uses: actions/cache@v5
        with:
          path: core/build/tests/models
          key: test-model-smollm2-135m-q2k-v1

      - name: Download Test Model
        if: matrix.build_type == 'Debug'
        id: test-model
        run: |
          MODEL_DIR="${{ github.workspace }}/core/build/tests/models"
          MODEL_NAME="SmolLM2-135M.Q2_K.gguf"
          MODEL_PATH="${MODEL_DIR}/${MODEL_NAME}"
          mkdir -p "${MODEL_DIR}"
          if [ ! -f "${MODEL_PATH}" ]; then
            echo "Downloading ${MODEL_NAME}..."
            curl -L --fail --retry 3 --retry-delay 5 \
              -o "${MODEL_PATH}" \
              "https://huggingface.co/QuantFactory/SmolLM2-135M-GGUF/resolve/main/${MODEL_NAME}"
          else
            echo "Model already cached at ${MODEL_PATH}"
          fi
          echo "model_path=${MODEL_PATH}" >> "$GITHUB_OUTPUT"

      - name: Configure CMake
        working-directory: core
        run: |
          MODEL_FLAG=""
          if [ "${{ matrix.build_type }}" = "Debug" ] && \
             [ -n "${{ steps.test-model.outputs.model_path }}" ] && \
             [ -f "${{ steps.test-model.outputs.model_path }}" ]; then
            MODEL_FLAG="-DEDGE_VEDA_TEST_MODEL_PATH=${{ steps.test-model.outputs.model_path }}"
          fi
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DBUILD_TESTING=ON \
            -DEDGE_VEDA_BUILD_TESTS=ON \
            -DEDGE_VEDA_BUILD_STATIC=ON \
            ${MODEL_FLAG}

      - name: Build Core
        working-directory: core
        run: cmake --build build --config ${{ matrix.build_type }} -j $(nproc || sysctl -n hw.ncpu)

      - name: Run Core Tests
        working-directory: core/build
        run: ctest --output-on-failure --build-config ${{ matrix.build_type }}

      - name: Check Binary Size
        if: matrix.build_type == 'Release'
        working-directory: core/build
        run: |
          echo "Binary sizes:"
          find . -name "*.so" -o -name "*.dylib" -o -name "*.a" | xargs ls -lh
          # Fail if any shared library exceeds 50MB (3 engines: llama + whisper + sd)
          find . -name "*.so" -o -name "*.dylib" | while read file; do
            size=$(stat -f%z "$file" 2>/dev/null || stat -c%s "$file")
            if [ $size -gt 52428800 ]; then
              echo "ERROR: $file is too large: $size bytes (>50MB)"
              exit 1
            fi
          done

      - name: Upload Core Artifacts
        uses: actions/upload-artifact@v7
        if: matrix.build_type == 'Release'
        with:
          name: core-${{ matrix.os }}-release
          path: |
            core/build/libedgeveda.*
            core/build/*.so
            core/build/*.dylib
          retention-days: 7

  # iOS Build (non-blocking: XCFramework requires local submodules + Xcode Metal — see issue #32)
  ios-build:
    name: iOS Build
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install CMake and Ninja
        run: brew install cmake ninja ccache

      - name: Configure ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ios-release

      - name: Build iOS Framework
        run: make build-ios

      - name: Check Framework Size
        run: |
          if [ -d "flutter/ios/Frameworks/EdgeVedaCore.xcframework" ]; then
            du -sh flutter/ios/Frameworks/EdgeVedaCore.xcframework
            size=$(du -sk flutter/ios/Frameworks/EdgeVedaCore.xcframework | cut -f1)
            if [ $size -gt 102400 ]; then
              echo "ERROR: XCFramework is too large: ${size}KB (>100MB)"
              exit 1
            fi
          fi

      - name: Upload iOS Framework
        uses: actions/upload-artifact@v7
        with:
          name: ios-framework
          path: flutter/ios/Frameworks/EdgeVedaCore.xcframework
          retention-days: 7

  # Android Build (non-blocking: AAR requires NDK + local submodules — see issue #32)
  android-build:
    name: Android Build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26c
          add-to-path: true

      - name: Install CMake and Ninja
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build ccache

      - name: Configure ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: android-release

      - name: Build Android Shared Libraries
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: ./scripts/build-android.sh --clean --release

      - name: Check Library Sizes
        run: |
          echo "Android shared library sizes:"
          find build/android/jniLibs -name "*.so" -exec ls -lh {} \;
          # Fail if any .so exceeds 35MB (3 engines: llama + whisper + SD)
          find build/android/jniLibs -name "libedge_veda.so" | while read file; do
            size=$(stat -c%s "$file")
            if [ $size -gt 36700160 ]; then
              echo "ERROR: $file is too large: $size bytes (>35MB)"
              exit 1
            fi
          done

      - name: Upload Android Libraries
        uses: actions/upload-artifact@v7
        with:
          name: android-jnilibs
          path: build/android/jniLibs/
          retention-days: 7

  # Flutter Analysis and Tests
  flutter-analyze:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Get Flutter Dependencies
        working-directory: flutter
        run: flutter pub get

      - name: Verify Flutter Format
        working-directory: flutter
        run: dart format --set-exit-if-changed .

      - name: Run Flutter Analyze
        working-directory: flutter
        run: flutter analyze --fatal-warnings

      - name: Run Flutter Tests
        working-directory: flutter
        run: flutter test --coverage

      - name: Upload Coverage
        uses: codecov/codecov-action@v6
        with:
          files: flutter/coverage/lcov.info
          flags: flutter
          name: flutter-coverage

  # Swift Analysis (enable when swift/ SDK is scaffolded)
  swift-analyze:
    name: Swift Analyze & Build
    runs-on: macos-latest
    if: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Swift Package Resolve
        working-directory: swift
        run: swift package resolve

      - name: Swift Build
        working-directory: swift
        run: swift build -c release

      - name: Swift Test
        working-directory: swift
        run: swift test

  # Kotlin/Android Analysis (enable when kotlin/ SDK is scaffolded)
  kotlin-analyze:
    name: Kotlin Analyze & Test
    runs-on: ubuntu-latest
    if: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Kotlin Lint
        working-directory: kotlin
        run: ./gradlew ktlintCheck || echo "ktlint not configured yet"

      - name: Kotlin Build
        working-directory: kotlin
        run: ./gradlew build || echo "gradle build not configured yet"

      - name: Run Kotlin Tests
        working-directory: kotlin
        run: ./gradlew test || echo "tests not configured yet"

  # React Native Analysis (enable when react-native/ SDK is scaffolded)
  react-native-analyze:
    name: React Native Analyze & Test
    runs-on: ubuntu-latest
    if: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: react-native/package.json

      - name: Install Dependencies
        working-directory: react-native
        run: npm ci || npm install

      - name: TypeScript Check
        working-directory: react-native
        run: npm run typecheck || echo "typecheck not configured yet"

      - name: Lint
        working-directory: react-native
        run: npm run lint || echo "lint not configured yet"

      - name: Run Tests
        working-directory: react-native
        run: npm test || echo "tests not configured yet"

  # Code Quality Checks
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check C++ Format
        run: |
          find core -name "*.cpp" -o -name "*.h" -o -name "*.hpp" | \
          xargs clang-format --dry-run --Werror || \
          echo "clang-format check - some files need formatting"

      - name: Check for Large Files
        run: |
          # Check for files larger than 10MB that aren't in .gitignore
          find . -type f -size +10M | grep -v ".git" | grep -v "third_party" | \
          while read file; do
            echo "WARNING: Large file found: $file"
          done

      - name: License Header Check
        run: |
          echo "Checking for license headers..."
          # Add license header check script here

  # Security Scan
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  # Integration Tests (only on main branch)
  integration-tests:
    name: Integration Tests
    runs-on: macos-latest
    if: github.ref == 'refs/heads/main'
    needs: [core-build, flutter-analyze]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Download Core Artifacts
        uses: actions/download-artifact@v8
        with:
          name: core-macos-latest-release
          path: core/build

      - name: Run Integration Tests
        working-directory: flutter
        run: flutter test integration_test || echo "Integration tests not configured yet"

  # Build Summary (depends only on required checks — see issue #32)
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [core-build, flutter-analyze]
    if: always()
    steps:
      - name: Check Build Status
        run: |
          echo "Build Summary:"
          echo "Core Build: ${{ needs.core-build.result }}"
          echo "Flutter: ${{ needs.flutter-analyze.result }}"
          echo ""
          echo "Note: ios-build and android-build are non-blocking (continue-on-error)."
          echo "They require local submodules and platform SDKs not available in CI."
